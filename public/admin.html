<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin – Zone Checks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@media print {
  button,
  input,
  select,
  label,
  a {
    display: none !important;
  }

  body {
    padding: 0;
  }

  table {
    font-size: 12px;
  }

  h2 {
    text-align: center;
  }

  #archivedWatermark {
    display: block;
  }
}

body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th {
  background: #f3f4f6;
}

.summary {
  margin-top: 15px;
  font-weight: bold;
}

#archivedWatermark {
  display: none;
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 64px;
  font-weight: bold;
  color: rgba(180, 0, 0, 0.15);
  z-index: 9999;
  pointer-events: none;
  user-select: none;
}
</style>
</head>

<body>

<div id="archivedWatermark">ARCHIVED DATA</div>

<h2>Zone Check Report</h2>

<div style="margin-bottom:15px;">
  <a href="/">← Back to Home</a>
</div>

<div id="reportPeriod" style="margin-bottom:10px;font-weight:bold;"></div>

<div>
  <input id="filterBadge" placeholder="Badge #">

  <select id="filterZone">
    <option value="">All Zones</option>
    <option>Zone 1</option>
    <option>Zone 2</option>
    <option>Zone 3</option>
    <option>Zone 4</option>
    <option>BLM</option>
  </select>

  <select id="filterShift">
    <option value="">All Shifts</option>
    <option value="Day">Day Shift</option>
    <option value="Night">Night Shift</option>
  </select>

  <input type="date" id="filterFrom">
  <input type="date" id="filterTo">

  <button onclick="loadChecks()">Apply Filters</button>
  <button onclick="window.print()">Print</button>
</div>

<label style="margin-left:10px;">
  <input type="checkbox" id="showArchived" onchange="loadChecks()">
  Show Archived
</label>

<div class="summary" id="summary"></div>
<div class="summary" id="zoneTotals"></div>

<table>
  <thead>
    <tr>
      <th>Badge</th>
      <th>Shift</th>
      <th>Zone</th>
      <th>Entry</th>
      <th>Exit</th>
      <th>Minutes</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<button
  style="background:#dc2626;color:white"
  onclick="resetReports()">
  Reset Reporting Period
</button>

<script>
let allChecks = [];

async function resetReports() {
  const confirm1 = confirm(
    "This will clear the current report view.\nArchived data is preserved."
  );
  if (!confirm1) return;

  const confirm2 = confirm(
    "Are you sure you want to start a new reporting period?"
  );
  if (!confirm2) return;

  await fetch("/admin/reset", { method: "POST" });
  loadChecks();
}

async function loadChecks() {
  const showArchived =
    document.getElementById("showArchived")?.checked;

  document.getElementById("archivedWatermark").style.display =
    showArchived ? "block" : "none";

  const url = showArchived
    ? "/checks?archived=1"
    : "/checks";

  const res = await fetch(url);

  if (res.status === 403) {
    window.location = "/admin-login.html";
    return;
  }

  allChecks = await res.json();
  applyFilters();
}

function applyFilters() {
  const badge = document.getElementById("filterBadge").value;
  const zone = document.getElementById("filterZone").value;
  const from = document.getElementById("filterFrom").value;
  const to = document.getElementById("filterTo").value;
  const shift = document.getElementById("filterShift").value;

  let filtered = allChecks.filter(c => {
    if (badge && c.badge_number !== badge) return false;
    if (zone && c.zone !== zone) return false;
    if (shift && c.shift !== shift) return false;

    const entryDate = c.entry_time.slice(0, 10);
    if (from && entryDate < from) return false;
    if (to && entryDate > to) return false;

    return true;
  });

  renderTable(filtered);
}

function renderTable(data) {
  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  let totalMinutes = 0;
  const zoneCounts = {};

  data.forEach(c => {
    totalMinutes += c.duration_minutes || 0;

    zoneCounts[c.zone] = (zoneCounts[c.zone] || 0) + 1;

    tbody.innerHTML += `
      <tr>
        <td>${c.badge_number}</td>
        <td>${c.shift}</td>
        <td>
          ${c.zone}
          ${c.blm_location ? `<br><small>${c.blm_location}</small>` : ""}
        </td>
        <td>${new Date(c.entry_time).toLocaleString()}</td>
        <td>${c.exit_time ? new Date(c.exit_time).toLocaleString() : "Active"}</td>
        <td>${c.duration_minutes || "-"}</td>
      </tr>
    `;
  });

  document.getElementById("summary").textContent =
    `Total Checks: ${data.length} | Total Time: ${totalMinutes} minutes`;

  let totalsHtml = "";
  for (const zone in zoneCounts) {
    totalsHtml += `${zone}: ${zoneCounts[zone]} | `;
  }

  document.getElementById("zoneTotals").innerHTML = totalsHtml;
}

loadChecks();
</script>

</body>
</html>
