<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Check App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  font-size: 16px;
}

button.enter { background:#2563eb; color:white; }
button.exit { background:#dc2626; color:white; }

#activeCard {
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 10px;
  text-align: center;
}

.active {
  background:#d1fae5;
  border:2px solid #10b981;
}

.inactive {
  background:#f3f4f6;
  border:2px dashed #9ca3af;
}

#warning {
  color:#b91c1c;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Zone Check</h2>

<div id="activeCard" class="inactive">
  <h3 id="activeTitle">No Active Zone</h3>
  <p id="activeDetails">Not currently checked in.</p>
</div>

<div id="badgeDisplay" style="margin-bottom:10px;font-weight:bold;"></div>

<select id="zone" onchange="handleZoneChange()">
  <option>Zone 1</option>
  <option>Zone 2</option>
  <option>Zone 3</option>
  <option>Zone 4</option>
  <option>BLM</option>
</select>
<div id="blmLocationContainer" style="display:none;">
  <input
    id="blmLocation"
    type="text"
    placeholder="Enter BLM Location"
  />
</div>


<button class="enter" onclick="enterZone()">Enter Zone</button>
<button class="exit" onclick="exitZone()">Exit Zone</button>
<button onclick="toggleMyChecks()">My Checks</button>
<div id="myChecksPanel" style="margin-top:15px; display:none;"></div>
<a href="/admin-login.html">Admin Login</a>

<div id="warning"></div>

<script>
let db;
let activeCheck = null;
let timer;

/* Escapes user-supplied strings before they're inserted into innerHTML —
   see same helper in admin.html for why this matters. */
function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));
}

/* 🔐 Deputy login enforcement */
document.addEventListener("DOMContentLoaded", () => {
  const badge = localStorage.getItem("badge_number");
  if (!badge) {
    window.location = "/deputy-login.html";
    return;
  }

  document.getElementById("badgeDisplay").textContent =
    "User: " + badge;
});

/* IndexedDB */
const request = indexedDB.open("zoneChecksDB", 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("checks", { keyPath: "local_id" });
};
request.onsuccess = e => {
  db = e.target.result;
  restoreActiveCheck();
  syncChecks();
};

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.textContent = msg;
  setTimeout(() => w.textContent = "", 3000);
}

/* enterZone */
async function enterZone() {
  if (activeCheck) {
    showWarning("Already checked into a zone on this device.");
    return;
  }

  const badge = localStorage.getItem("badge_number");

  // 🔒 Cross-device check (server-side)
  if (navigator.onLine) {
    const res = await fetch(`/active-check/${badge}`);
    const data = await res.json();

    if (data.active) {
      const started = new Date(data.entry_time).toLocaleTimeString();
      showWarning(
        `⚠️ Already active in ${data.zone} (started ${started}) on another device.`
      );
      return;
    }
  }

const zone = document.getElementById("zone").value;
let blmLocation = null;

if (zone === "BLM") {
  blmLocation = document.getElementById("blmLocation").value.trim();
  if (!blmLocation) {
    showWarning("BLM location required.");
    return;
  }
}


  // ✅ Create local active check
activeCheck = {
  local_id: crypto.randomUUID(),
  badge_number: badge,
  zone: zone,
  blm_location: blmLocation,
  entry_time: new Date().toISOString(),
  active: true,
  synced: false
};


  saveLocal(activeCheck);
  setActiveUI();

  // 📡 Register active check with server
  if (navigator.onLine) {
    fetch("/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(activeCheck)
    });
  }
}

async function exitZone() {
  const badge = localStorage.getItem("badge_number");

  // Case 1: Active zone on THIS device
  if (activeCheck) {
    const now = new Date();

    let duration = Math.round(
      (now - new Date(activeCheck.entry_time)) / 60000
    );

    // BLM Only - round UP to next 15-minute block
    if (activeCheck.zone === "BLM") {
      duration = Math.ceil(duration / 15) * 15;
    }

    if (duration < 60) {
      if (!confirm(`Only ${duration} minutes spent. Exit anyway?`)) return;
    }

    activeCheck.exit_time = now.toISOString();
    activeCheck.duration_minutes = duration;
    activeCheck.active = false;

    saveLocal(activeCheck);
    clearActiveUI();
    activeCheck = null;

    syncChecks();
    return;
  }

  // Case 2: No local active zone — check server
  if (!navigator.onLine) {
    showWarning("No active zone on this device.");
    return;
  }

  const res = await fetch(`/active-check/${badge}`);
  const data = await res.json();

  if (!data.active) {
    showWarning("No active zone found.");
    return;
  }

  // Case 3: Active zone on ANOTHER device
  const started = new Date(data.entry_time).toLocaleTimeString();
  const confirmForce = confirm(
    `You are active in ${data.zone} (started ${started}) on another device.\n\nExit that zone now?`
  );

  if (!confirmForce) return;

  const forceRes = await fetch(`/force-exit/${badge}`, {
    method: "POST"
  });

const result = await forceRes.json();

  if (result.success) {
    showWarning("Zone exited successfully.");

    // Optional improvement:
    activeCheck = null;
    clearActiveUI();

  } else {
    showWarning("Unable to exit zone.");
  }

}

function handleZoneChange() {
  const zone = document.getElementById("zone").value;
  const container = document.getElementById("blmLocationContainer");

  if (zone === "BLM") {
    container.style.display = "block";
  } else {
    container.style.display = "none";
    document.getElementById("blmLocation").value = "";
  }
}


function saveLocal(record) {
  const tx = db.transaction("checks", "readwrite");
  tx.objectStore("checks").put(record);
}

function restoreActiveCheck() {
  const tx = db.transaction("checks", "readonly");
  tx.objectStore("checks").getAll().onsuccess = e => {
    const found = e.target.result.find(r => r.active);

    if (found) {
      activeCheck = found;
      setActiveUI();

      if (found.zone === "BLM") {
        document.getElementById("zone").value = "BLM";
        document.getElementById("blmLocationContainer").style.display = "block";
        document.getElementById("blmLocation").value =
          found.blm_location || "";
      }
    }
  };
}

function setActiveUI() {
  clearInterval(timer);
  document.getElementById("activeCard").className = "active";
  document.getElementById("activeTitle").textContent =
    "🟢 Active: " + activeCheck.zone;
  updateTimer();
  timer = setInterval(updateTimer, 1000);
}

function clearActiveUI() {
  document.getElementById("activeCard").className = "inactive";
  document.getElementById("activeTitle").textContent = "No Active Zone";
  document.getElementById("activeDetails").textContent =
    "Not currently checked in.";
  clearInterval(timer);
}

function updateTimer() {
  const start = new Date(activeCheck.entry_time);
  const mins = Math.floor((Date.now() - start) / 60000);
  document.getElementById("activeDetails").textContent =
    `Started ${start.toLocaleTimeString()} • ${mins} min elapsed`;
}

async function syncChecks() {
  if (!navigator.onLine) return;

  const tx = db.transaction("checks", "readonly");
  tx.objectStore("checks").getAll().onsuccess = async e => {
    for (const c of e.target.result) {
      if (!c.synced && !c.active && c.exit_time) {
        await fetch("/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(c)
        });
        c.synced = true;
        saveLocal(c);
      }
    }
  };
}

async function toggleMyChecks() {
  const panel = document.getElementById("myChecksPanel");

  if (panel.style.display === "block") {
    panel.style.display = "none";
    return;
  }

  await loadMyChecks();
  panel.style.display = "block";
}

async function loadMyChecks() {
  const badge = localStorage.getItem("badge_number");
  const res = await fetch(`/my-checks/${badge}`);
  const checks = await res.json();
  const panel = document.getElementById("myChecksPanel");

  if (!checks.length) {
    panel.innerHTML = "<p>No checks this reporting period.</p>";
    return;
  }

  renderMyChecks(checks);
}

function renderMyChecks(checks) {
  const panel = document.getElementById("myChecksPanel");
  let totalMinutes = 0;

  let html = `
    <h3>My Checks (Current Period)</h3>
    <table style="width:100%; font-size:14px;">
      <tr>
        <th>Zone</th>
        <th>Time</th>
        <th>Minutes</th>
        <th></th>
      </tr>
  `;

  checks.forEach(c => {
    if (c.duration_minutes) {
      totalMinutes += c.duration_minutes;
    }

    const entry = new Date(c.entry_time).toLocaleTimeString();
    const exit = c.exit_time
      ? new Date(c.exit_time).toLocaleTimeString()
      : "Active";

    html += `
      <tr>
        <td>
          ${escapeHtml(c.zone)}
          ${c.blm_location ? `<br><small>${escapeHtml(c.blm_location)}</small>` : ""}
          ${c.edited ? `<br><small style="color:#b45309;">✏️ edited</small>` : ""}
        </td>
        <td>${entry} - ${exit}</td>
        <td>${c.duration_minutes || "-"}</td>
        <td>
          <button onclick="startEdit(${c.id})"
            style="width:auto;padding:4px 8px;font-size:12px;">Edit</button>
        </td>
      </tr>
      <tr id="editRow-${c.id}" style="display:none;">
        <td colspan="4">
          <div style="background:#f3f4f6;padding:10px;border-radius:8px;margin:6px 0;">
            <label style="display:block;font-size:12px;margin-top:6px;">
              Entry time
              <input type="datetime-local" id="editEntry-${c.id}"
                value="${toDatetimeLocal(c.entry_time)}"
                style="width:100%;padding:8px;font-size:14px;">
            </label>
            <label style="display:block;font-size:12px;margin-top:6px;">
              Exit time
              <input type="datetime-local" id="editExit-${c.id}"
                value="${toDatetimeLocal(c.exit_time)}"
                style="width:100%;padding:8px;font-size:14px;">
            </label>
            <label style="display:block;font-size:12px;margin-top:6px;">
              Reason for change (required)
              <input type="text" id="editReason-${c.id}"
                placeholder="e.g. forgot to clock out"
                style="width:100%;padding:8px;font-size:14px;">
            </label>
            <button onclick="saveEdit(${c.id})"
              style="width:auto;padding:8px 14px;font-size:13px;background:#2563eb;color:white;margin-top:10px;">
              Save
            </button>
            <button onclick="cancelEdit(${c.id})"
              style="width:auto;padding:8px 14px;font-size:13px;margin-top:10px;">
              Cancel
            </button>
          </div>
        </td>
      </tr>
    `;
  });

  html += `
    </table>
    <p><strong>Total Time:</strong> ${totalMinutes} minutes</p>
  `;

  panel.innerHTML = html;
}

function startEdit(id) {
  document.getElementById(`editRow-${id}`).style.display = "table-row";
}

function cancelEdit(id) {
  document.getElementById(`editRow-${id}`).style.display = "none";
}

/* datetime-local inputs need "YYYY-MM-DDTHH:mm" in *local* time, with no
   timezone suffix — this converts an ISO timestamp to that format. */
function toDatetimeLocal(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function saveEdit(id) {
  const entryVal = document.getElementById(`editEntry-${id}`).value;
  const exitVal = document.getElementById(`editExit-${id}`).value;
  const reason = document.getElementById(`editReason-${id}`).value.trim();

  if (!entryVal) {
    showWarning("Entry time is required.");
    return;
  }
  if (!reason) {
    showWarning("Please explain why you're changing this entry.");
    return;
  }

  const badge = localStorage.getItem("badge_number");

  const res = await fetch(`/checks/${id}/edit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      badge_number: badge,
      entry_time: new Date(entryVal).toISOString(),
      exit_time: exitVal ? new Date(exitVal).toISOString() : null,
      reason
    })
  });

  const result = await res.json();

  if (!res.ok) {
    showWarning(result.error || "Unable to save changes.");
    return;
  }

  showWarning("Check updated.");
  await loadMyChecks();
}

window.addEventListener("online", syncChecks);
</script>

</body>
</html>
